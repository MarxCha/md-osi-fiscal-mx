name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-yaml:
    name: Validate YAML against JSON Schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema check-jsonschema

      - name: Validate reglas against schema
        run: |
          shopt -s nullglob
          files=(spec/reglas/*.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No reglas YAML found yet (1.0.0-rc1 placeholder) — skipping"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Validating $f"
            check-jsonschema --schemafile spec/schemas/regla.schema.json "$f"
          done

      - name: Validate domains against schema
        run: |
          shopt -s nullglob
          files=(spec/domains/*.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No domains YAML found yet (1.0.0-rc1 placeholder) — skipping"
            exit 0
          fi
          for f in "${files[@]}"; do
            echo "Validating $f"
            check-jsonschema --schemafile spec/schemas/domain.schema.json "$f"
          done

  lint-yaml:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          shopt -s nullglob
          yaml_files=(spec/**/*.yaml spec/**/*.yml)
          if [ ${#yaml_files[@]} -eq 0 ]; then
            echo "No YAML files in spec/ yet — skipping yamllint"
            exit 0
          fi
          yamllint -c .yamllint.yml spec/

  test-fixtures:
    name: Run fixture tests
    runs-on: ubuntu-latest
    needs: [validate-yaml]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python implementation + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml jsonschema
          if [ -d implementations/python ] && [ -f implementations/python/pyproject.toml ]; then
            pip install -e implementations/python
          fi

      - name: Run pytest on tests/
        run: |
          if [ -d tests ] && [ "$(find tests -name 'test_*.py' | wc -l)" -gt 0 ]; then
            pytest tests/ -v
          else
            echo "No tests yet (Sprint 0 rc1) — skipping"
          fi

  changelog-check:
    name: CHANGELOG.md must change for non-doc PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify CHANGELOG updated when spec/ changes
        run: |
          BASE=${{ github.base_ref }}
          git fetch origin "$BASE"
          CHANGED=$(git diff --name-only "origin/$BASE"...HEAD)
          if echo "$CHANGED" | grep -q '^spec/' && ! echo "$CHANGED" | grep -q '^CHANGELOG.md$'; then
            echo "::error::PR cambia spec/ pero NO actualiza CHANGELOG.md. Por favor agrega entrada en [Unreleased]."
            exit 1
          fi
          echo "OK: spec/ + CHANGELOG en sync (o cambio fuera de spec/)"
